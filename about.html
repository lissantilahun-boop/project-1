<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f4ea;
      --muted: #bfc6d4;
      --panel: rgba(17, 24, 39, 0.72);
      --line: rgba(255, 255, 255, 0.18);
      --mint: #47f5c9;
      --gold: #ffd166;
      --rose: #ff6f91;
      --sky: #74c0fc;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 15%, rgba(71, 245, 201, 0.24), transparent 27rem),
        radial-gradient(circle at 86% 20%, rgba(255, 111, 145, 0.22), transparent 29rem),
        radial-gradient(circle at 52% 88%, rgba(116, 192, 252, 0.22), transparent 28rem),
        linear-gradient(135deg, #08111f 0%, #151927 48%, #241723 100%);
    }

    .page {
      width: min(92vw, 920px);
      padding: 2rem;
      text-align: center;
      position: relative;
      isolation: isolate;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 1rem;
      z-index: -1;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(18px);
    }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-bottom: 3rem;
    }

    nav a {
      min-width: 6.5rem;
      padding: 0.72rem 1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      text-decoration: none;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    nav a:hover,
    nav a.active {
      transform: translateY(-2px);
      border-color: rgba(71, 245, 201, 0.72);
      background: rgba(71, 245, 201, 0.14);
    }

    .spark {
      width: 5.25rem;
      height: 5.25rem;
      margin: 0 auto 1.6rem;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #09111f;
      background: conic-gradient(from 210deg, var(--mint), var(--gold), var(--rose), var(--sky), var(--mint));
      box-shadow: 0 0 42px rgba(71, 245, 201, 0.32);
      animation: float 4s ease-in-out infinite;
    }

    .spark span {
      width: 3.8rem;
      height: 3.8rem;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.88);
      font-size: 2rem;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-wrap: balance;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, var(--mint), var(--gold), var(--rose));
      -webkit-background-clip: text;
      background-clip: text;
    }

    p {
      max-width: 38rem;
      margin: 1.35rem auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      line-height: 1.7;
    }

    .shine,
    .contact-list {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      margin-top: 2.2rem;
      padding: 0.9rem 1.1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
      font-weight: 700;
    }

    .contact-list {
      border-radius: 8px;
      flex-direction: column;
      align-items: stretch;
      text-align: left;
      width: min(100%, 28rem);
    }

    .contact-list a {
      color: var(--ink);
      text-decoration: none;
      padding: 0.5rem 0;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
      margin: 2rem auto 0;
      max-width: 46rem;
    }

    .gallery-item {
      min-height: 10rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      text-align: left;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, rgba(71, 245, 201, 0.34), rgba(255, 209, 102, 0.18));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .gallery-item::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 70% 22%, rgba(255, 255, 255, 0.52), transparent 0.95rem), linear-gradient(160deg, transparent 0%, rgba(0, 0, 0, 0.35) 100%);
    }

    .gallery-item:nth-child(2) { background: linear-gradient(135deg, rgba(255, 111, 145, 0.36), rgba(116, 192, 252, 0.2)); }
    .gallery-item:nth-child(3) { background: linear-gradient(135deg, rgba(255, 209, 102, 0.34), rgba(71, 245, 201, 0.18)); }
    .gallery-item:nth-child(4) { background: linear-gradient(135deg, rgba(116, 192, 252, 0.38), rgba(255, 111, 145, 0.2)); }
    .gallery-item:nth-child(5) { background: linear-gradient(135deg, rgba(71, 245, 201, 0.28), rgba(116, 192, 252, 0.22)); }
    .gallery-item:nth-child(6) { background: linear-gradient(135deg, rgba(255, 111, 145, 0.32), rgba(255, 209, 102, 0.22)); }

    .gallery-item span {
      position: relative;
      z-index: 1;
      font-weight: 800;
      color: var(--ink);
      text-shadow: 0 1px 18px rgba(0, 0, 0, 0.45);
    }

    .dot {
      width: 0.65rem;
      height: 0.65rem;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 20px var(--mint);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(8deg); }
    }

    @media (max-width: 720px) {
      .gallery-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 520px) {
      .page { padding: 1.2rem; }
      .page::before { inset: 0.35rem; }
      nav { margin-bottom: 2.2rem; }
      nav a { min-width: 5.75rem; }
      .gallery-grid { grid-template-columns: 1fr; }
    }

  </style>
</head>
<body>
  <main class="page">
    <nav aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a class="active" href="about.html">About</a>
      <a href="gallery.html">Gallery</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="spark" aria-hidden="true"><span>A</span></div>
    <h1>About <span>This Page</span></h1>
    <p>This little site is built as a bright, polished starter: simple HTML, smooth styling, and four pages that feel like they belong together.</p>
    <div class="shine"><span class="dot"></span>Made with plain HTML and CSS</div>
  </main>
</body>
</html>
