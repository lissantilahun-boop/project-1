<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f4ea;
      --muted: #bfc6d4;
      --panel: rgba(17, 24, 39, 0.72);
      --line: rgba(255, 255, 255, 0.18);
      --mint: #47f5c9;
      --gold: #ffd166;
      --rose: #ff6f91;
      --sky: #74c0fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 15%, rgba(71, 245, 201, 0.24), transparent 27rem),
        radial-gradient(circle at 86% 20%, rgba(255, 111, 145, 0.22), transparent 29rem),
        radial-gradient(circle at 52% 88%, rgba(116, 192, 252, 0.22), transparent 28rem),
        linear-gradient(135deg, #08111f 0%, #151927 48%, #241723 100%);
    }

    main {
      width: min(92vw, 760px);
      padding: 4.5rem 2rem;
      text-align: center;
      position: relative;
      isolation: isolate;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 1rem;
      z-index: -1;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(18px);
    }

    .spark {
      width: 5.25rem;
      height: 5.25rem;
      margin: 0 auto 1.6rem;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #09111f;
      background: conic-gradient(from 210deg, var(--mint), var(--gold), var(--rose), var(--sky), var(--mint));
      box-shadow: 0 0 42px rgba(71, 245, 201, 0.32);
      animation: float 4s ease-in-out infinite;
    }

    .spark span {
      width: 3.8rem;
      height: 3.8rem;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.88);
      font-size: 2rem;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.5rem, 12vw, 7.5rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-wrap: balance;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, var(--mint), var(--gold), var(--rose));
      -webkit-background-clip: text;
      background-clip: text;
    }

    p {
      max-width: 34rem;
      margin: 1.35rem auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      line-height: 1.7;
    }

    .shine {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      margin-top: 2.2rem;
      padding: 0.9rem 1.1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
      font-weight: 700;
    }

    .dot {
      width: 0.65rem;
      height: 0.65rem;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 20px var(--mint);
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-12px) rotate(8deg);
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="spark" aria-hidden="true">
      <span>H</span>
    </div>
    <h1>Hello <span>World</span></h1>
    <p>A tiny page with a little polish: luminous color, glassy depth, and a friendly first greeting.</p>
    <div class="shine">
      <span class="dot"></span>
      Ready to open
    </div>
  </main>
</body>
</html>
